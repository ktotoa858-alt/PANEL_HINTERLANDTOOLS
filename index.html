<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>HINTERLAND | License Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #05050a;
            color: #eef2ff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Градиентный фон */
        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 20% 30%, #0a0a15, #020205);
            z-index: -2;
        }

        .bg::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, rgba(0, 212, 255, 0.08) 0%, transparent 60%);
            animation: pulse1 10s ease infinite;
        }

        .bg::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 60%, rgba(168, 85, 247, 0.06) 0%, transparent 60%);
            animation: pulse2 12s ease infinite reverse;
        }

        @keyframes pulse1 {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.03); }
        }
        @keyframes pulse2 {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.04); }
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* Карточка */
        .card {
            background: rgba(8, 8, 18, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 28px 24px;
            border: 1px solid rgba(0, 212, 255, 0.15);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        /* Хедер */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.15);
        }

        .logo h2 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff, #00d4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo p {
            font-size: 9px;
            color: #4a5678;
            letter-spacing: 1px;
        }

        .status-badge {
            background: rgba(0, 212, 255, 0.1);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 11px;
            font-weight: 500;
            color: #00d4ff;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        /* Статистика */
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 28px;
        }

        .stat {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #00d4ff;
        }

        .stat-label {
            font-size: 11px;
            color: #5a6e8a;
            margin-top: 4px;
        }

        /* Табы */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .tab.active {
            background: linear-gradient(135deg, #00d4ff20, #a855f720);
            border-color: #00d4ff;
            color: #00d4ff;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Инпуты */
        input, select {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            color: #fff;
            font-size: 14px;
            outline: none;
            margin-bottom: 12px;
            transition: all 0.2s;
        }

        input:focus, select:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        /* Кнопки */
        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #a855f7);
            color: #fff;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Ключи */
        .key-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .key-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 10px;
            border-left: 3px solid #00d4ff;
        }

        .key-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 8px;
        }

        .key-code {
            font-family: 'Monaco', monospace;
            font-size: 12px;
            font-weight: 600;
            word-break: break-all;
        }

        .key-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 40px;
            font-size: 10px;
            font-weight: 600;
        }

        .badge-active { background: #00cc6640; color: #5effa6; }
        .badge-banned { background: #ff336640; color: #ff9090; }
        .badge-frozen { background: #00d4ff40; color: #aaf0ff; }
        .badge-waiting { background: #66666640; color: #aaa; }

        .key-meta {
            font-size: 10px;
            color: #5a6e8a;
            margin-bottom: 10px;
        }

        .key-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .key-actions button {
            background: rgba(20, 20, 40, 0.9);
            border: none;
            border-radius: 40px;
            padding: 5px 12px;
            font-size: 10px;
            color: #ccc;
            cursor: pointer;
            transition: 0.1s;
        }

        .key-actions button:active {
            transform: scale(0.95);
        }

        .hidden {
            display: none;
        }

        .time-group {
            display: flex;
            gap: 8px;
        }

        .time-group input {
            flex: 1;
            margin-bottom: 0;
        }

        .time-group select {
            flex: 1;
            margin-bottom: 0;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a15;
        }
        ::-webkit-scrollbar-thumb {
            background: #00d4ff;
            border-radius: 4px;
        }
    </style>
</head>
<body>
<div class="bg"></div>
<div class="container">
    <div class="card">
        <div class="header">
            <div class="logo">
                <h2>⎯ HINTERLAND</h2>
                <p>LICENSE SYSTEM v2.0</p>
            </div>
            <div class="status-badge" id="onlineStatus">● ONLINE</div>
        </div>

        <div class="stats">
            <div class="stat"><div class="stat-value" id="totalKeys">0</div><div class="stat-label">TOTAL</div></div>
            <div class="stat"><div class="stat-value" id="activeKeys">0</div><div class="stat-label">ACTIVE</div></div>
            <div class="stat"><div class="stat-value" id="bannedKeys">0</div><div class="stat-label">BANNED</div></div>
            <div class="stat"><div class="stat-value" id="frozenKeys">0</div><div class="stat-label">FROZEN</div></div>
        </div>

        <div class="tabs">
            <div class="tab active" data-tab="keys">KEYS</div>
            <div class="tab" data-tab="generate">GENERATE</div>
            <div class="tab" data-tab="banned">BLOCKED</div>
            <div class="tab" data-tab="settings">SETTINGS</div>
        </div>

        <!-- Вкладка KEYS -->
        <div id="tabKeys" class="tab-content active">
            <input type="text" id="searchInput" placeholder="🔍 SEARCH KEY...">
            <div class="key-list" id="keysList"></div>
        </div>

        <!-- Вкладка GENERATE -->
        <div id="tabGenerate" class="tab-content">
            <input type="text" id="gameInput" placeholder="GAME NAME (PUBG, CS2, RUST...)">
            <select id="durationType">
                <option value="day">📅 1 DAY</option>
                <option value="week">📆 1 WEEK</option>
                <option value="month">🌙 1 MONTH</option>
                <option value="forever">👑 FOREVER</option>
                <option value="custom">⚙️ CUSTOM TIME</option>
                <option value="exclusive">💎 EXCLUSIVE</option>
            </select>
            <div id="customBlock" class="hidden">
                <div class="time-group">
                    <input type="number" id="customValue" placeholder="VALUE" value="1">
                    <select id="customUnit">
                        <option value="minute">MINUTES</option>
                        <option value="hour">HOURS</option>
                        <option value="day">DAYS</option>
                        <option value="week">WEEKS</option>
                        <option value="month">MONTHS</option>
                        <option value="year">YEARS</option>
                    </select>
                </div>
            </div>
            <div id="exclusiveBlock" class="hidden">
                <input type="text" id="exclusiveName" placeholder="EXCLUSIVE NAME">
            </div>
            <button id="generateBtn" class="btn btn-primary">⚡ GENERATE</button>
            <div id="genResult" class="hidden" style="margin-top: 16px; padding: 12px; background: #00cc6640; border-radius: 16px; text-align: center; font-size: 12px;"></div>
        </div>

        <!-- Вкладка BLOCKED -->
        <div id="tabBanned" class="tab-content">
            <div class="key-list" id="bannedList"></div>
        </div>

        <!-- Вкладка SETTINGS -->
        <div id="tabSettings" class="tab-content">
            <button id="backupBtn" class="btn btn-secondary" style="margin-bottom: 10px;">💾 EXPORT DATABASE</button>
            <input type="file" id="uploadBackup" accept=".json" style="display: none;">
            <button id="uploadBackupBtn" class="btn btn-secondary">📤 IMPORT DATABASE</button>
            <button id="clearAllBtn" class="btn btn-secondary" style="margin-top: 10px; background: #ff336640; border-color: #ff3366;">⚠️ CLEAR ALL KEYS</button>
            <div style="margin-top: 20px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.05);">
                <p style="font-size: 10px; color: #4a5678; text-align: center;">HINTERLAND LICENSE SYSTEM<br>© 2024 — All data encrypted</p>
            </div>
        </div>
    </div>
</div>

<script>
    // ===== CONFIG =====
    const BOT_TOKEN = "8715239638:AAFUjCc9FZ5dLcHDgWykacgxItojaWNAWqk";
    const ADMIN_ID = "5918278038";
    const TG_API = `https://api.telegram.org/bot${BOT_TOKEN}`;

    let licenses = [];

    async function sendToBot(text) {
        try {
            await fetch(`${TG_API}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: ADMIN_ID, text: text })
            });
        } catch(e) { console.error(e); }
    }

    function saveData() {
        localStorage.setItem("hinterland_db", JSON.stringify(licenses));
        renderStats();
        renderKeysList();
        renderBannedList();
    }

    function loadData() {
        const saved = localStorage.getItem("hinterland_db");
        licenses = saved ? JSON.parse(saved) : [];
        renderStats();
        renderKeysList();
        renderBannedList();
    }

    function generateKey(prefix) {
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        let rand = "";
        for (let i = 0; i < 12; i++) rand += chars[Math.floor(Math.random() * chars.length)];
        return `${prefix}-${rand}`;
    }

    function getExpiry(dtype, value, unit) {
        if (dtype === "forever") return null;
        const now = new Date();
        if (dtype === "day") return new Date(now.getTime() + 86400000);
        if (dtype === "week") return new Date(now.getTime() + 604800000);
        if (dtype === "month") return new Date(now.getTime() + 2592000000);
        if (unit === "minute") return new Date(now.getTime() + value * 60000);
        if (unit === "hour") return new Date(now.getTime() + value * 3600000);
        if (unit === "day") return new Date(now.getTime() + value * 86400000);
        if (unit === "week") return new Date(now.getTime() + value * 604800000);
        if (unit === "month") return new Date(now.getTime() + value * 2592000000);
        if (unit === "year") return new Date(now.getTime() + value * 31536000000);
        return null;
    }

    function isExpired(lic) {
        if (!lic.expires_at) return false;
        return new Date() > new Date(lic.expires_at);
    }

    function formatExpiry(lic) {
        if (!lic.expires_at) return "∞";
        const exp = new Date(lic.expires_at);
        const now = new Date();
        const diff = exp - now;
        if (diff <= 0) return "EXPIRED";
        const days = Math.floor(diff / 86400000);
        const hours = Math.floor((diff % 86400000) / 3600000);
        if (days > 0) return `${days}d ${hours}h`;
        return `${hours}h`;
    }

    document.getElementById("generateBtn").onclick = () => {
        const game = document.getElementById("gameInput").value.trim() || "UNKNOWN";
        const durationType = document.getElementById("durationType").value;
        let expires_at = null;
        let customName = null;
        let prefix = game.slice(0, 4).toUpperCase();

        if (durationType === "custom") {
            const val = parseInt(document.getElementById("customValue").value);
            const unit = document.getElementById("customUnit").value;
            expires_at = getExpiry("custom", val, unit);
            prefix = "HT";
        } else if (durationType === "exclusive") {
            customName = document.getElementById("exclusiveName").value.trim() || "EXCLUSIVE";
            expires_at = getExpiry("day", 1, "day");
            prefix = "EX";
        } else {
            expires_at = getExpiry(durationType, 1, null);
            if (durationType === "forever") expires_at = null;
        }

        const newKey = generateKey(prefix);
        licenses.push({
            key: newKey, game: game, custom_name: customName,
            duration_type: durationType, created_at: new Date().toISOString(),
            expires_at: expires_at ? expires_at.toISOString() : null,
            is_active: true, is_frozen: false, hwid: null, activated_at: null
        });
        saveData();
        sendToBot(`🔑 NEW LICENSE: ${newKey}\n🎮 GAME: ${game}\n⏱️ TYPE: ${durationType}`);
        
        const resultDiv = document.getElementById("genResult");
        resultDiv.classList.remove("hidden");
        resultDiv.innerHTML = `✅ LICENSE GENERATED: ${newKey}`;
        setTimeout(() => resultDiv.classList.add("hidden"), 3000);
        
        document.getElementById("exclusiveName").value = "";
        document.getElementById("customValue").value = "1";
    };

    document.getElementById("durationType").onchange = (e) => {
        document.getElementById("customBlock").classList.add("hidden");
        document.getElementById("exclusiveBlock").classList.add("hidden");
        if (e.target.value === "custom") document.getElementById("customBlock").classList.remove("hidden");
        if (e.target.value === "exclusive") document.getElementById("exclusiveBlock").classList.remove("hidden");
    };

    function renderStats() {
        document.getElementById("totalKeys").innerText = licenses.length;
        document.getElementById("activeKeys").innerText = licenses.filter(l => l.is_active && !l.is_frozen && !isExpired(l) && l.hwid).length;
        document.getElementById("bannedKeys").innerText = licenses.filter(l => !l.is_active).length;
        document.getElementById("frozenKeys").innerText = licenses.filter(l => l.is_frozen).length;
    }

    function renderKeysList() {
        const search = document.getElementById("searchInput")?.value.toLowerCase() || "";
        let filtered = licenses.filter(l => l.key.toLowerCase().includes(search) || l.game.toLowerCase().includes(search));
        const container = document.getElementById("keysList");
        if (!filtered.length) { container.innerHTML = "<div style='text-align:center;padding:40px;color:#4a5678;'>NO KEYS FOUND</div>"; return; }
        let html = "";
        filtered.forEach((lic, idx) => {
            let badge = "";
            if (!lic.is_active) badge = "<span class='key-badge badge-banned'>BANNED</span>";
            else if (lic.is_frozen) badge = "<span class='key-badge badge-frozen'>FROZEN</span>";
            else if (isExpired(lic)) badge = "<span class='key-badge badge-banned'>EXPIRED</span>";
            else if (lic.hwid) badge = "<span class='key-badge badge-active'>ACTIVE</span>";
            else badge = "<span class='key-badge badge-waiting'>WAITING</span>";
            
            html += `
                <div class="key-item">
                    <div class="key-header">
                        <span class="key-code">${lic.key}</span>
                        ${badge}
                    </div>
                    <div class="key-meta">🎮 ${lic.game} ${lic.custom_name ? "| ✦ " + lic.custom_name : ""} | ⏱️ ${formatExpiry(lic)}</div>
                    <div class="key-actions">
                        <button onclick="toggleBlock(${idx})">${lic.is_active ? "BLOCK" : "UNBLOCK"}</button>
                        <button onclick="toggleFreeze(${idx})">${lic.is_frozen ? "UNFREEZE" : "FREEZE"}</button>
                        <button onclick="resetHWID(${idx})">RESET HWID</button>
                        <button onclick="deleteKey(${idx})">DELETE</button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function renderBannedList() {
        const banned = licenses.filter(l => !l.is_active || l.is_frozen);
        const container = document.getElementById("bannedList");
        if (!banned.length) { container.innerHTML = "<div style='text-align:center;padding:40px;color:#4a5678;'>NO BANNED KEYS</div>"; return; }
        let html = "";
        banned.forEach((lic, idx) => {
            const orig = licenses.findIndex(l => l.key === lic.key);
            let reason = !lic.is_active ? "BANNED" : "FROZEN";
            html += `
                <div class="key-item">
                    <div class="key-header">
                        <span class="key-code">${lic.key}</span>
                        <span class="key-badge ${!lic.is_active ? 'badge-banned' : 'badge-frozen'}">${reason}</span>
                    </div>
                    <div class="key-meta">🎮 ${lic.game}</div>
                    <div class="key-actions">
                        ${!lic.is_active ? `<button onclick="toggleBlock(${orig})">UNBLOCK</button>` : ""}
                        ${lic.is_frozen ? `<button onclick="toggleFreeze(${orig})">UNFREEZE</button>` : ""}
                        <button onclick="resetHWID(${orig})">RESET HWID</button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    window.toggleBlock = (idx) => { 
        licenses[idx].is_active = !licenses[idx].is_active; 
        saveData(); 
        sendToBot(`${licenses[idx].is_active ? "🔓 UNBLOCKED" : "🔒 BLOCKED"}: ${licenses[idx].key}`);
    };
    
    window.toggleFreeze = (idx) => { 
        licenses[idx].is_frozen = !licenses[idx].is_frozen; 
        saveData(); 
        sendToBot(`${licenses[idx].is_frozen ? "❄️ FROZEN" : "🔥 UNFROZEN"}: ${licenses[idx].key}`);
    };
    
    window.resetHWID = (idx) => { 
        licenses[idx].hwid = null; 
        licenses[idx].activated_at = null; 
        saveData(); 
        sendToBot(`🔄 HWID RESET: ${licenses[idx].key}`);
    };
    
    window.deleteKey = (idx) => { 
        if (confirm("DELETE LICENSE?")) { 
            const key = licenses[idx].key; 
            licenses.splice(idx,1); 
            saveData(); 
            sendToBot(`🗑 DELETED: ${key}`);
        } 
    };

    document.getElementById("searchInput").oninput = () => renderKeysList();
    
    document.getElementById("backupBtn").onclick = () => {
        const blob = new Blob([JSON.stringify(licenses, null, 2)], {type: "application/json"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "hinterland_db.json";
        a.click();
    };
    
    document.getElementById("uploadBackupBtn").onclick = () => document.getElementById("uploadBackup").click();
    document.getElementById("uploadBackup").onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const data = JSON.parse(ev.target.result);
                if (Array.isArray(data)) { licenses = data; saveData(); alert("✅ DATABASE IMPORTED"); }
                else alert("❌ INVALID FORMAT");
            } catch(err) { alert("ERROR"); }
        };
        reader.readAsText(file);
    };
    
    document.getElementById("clearAllBtn").onclick = () => {
        if (confirm("⚠️ DELETE ALL KEYS? THIS CANNOT BE UNDONE!")) {
            licenses = [];
            saveData();
            sendToBot(`🗑 ALL KEYS DELETED`);
        }
    };

    document.querySelectorAll(".tab").forEach(tab => {
        tab.onclick = () => {
            document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
            tab.classList.add("active");
            document.querySelectorAll(".tab-content").forEach(tc => tc.classList.remove("active"));
            document.getElementById(`tab${tab.dataset.tab.charAt(0).toUpperCase() + tab.dataset.tab.slice(1)}`).classList.add("active");
        };
    });

    loadData();
    setInterval(() => {
        if (document.getElementById("tabKeys").classList.contains("active")) renderKeysList();
        if (document.getElementById("tabBanned").classList.contains("active")) renderBannedList();
        renderStats();
    }, 2000);
</script>
</body>
</html>
